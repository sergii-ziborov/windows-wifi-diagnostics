name: Release installers

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node -e "const expected = 'v' + require('./package.json').version; if (process.env.RELEASE_TAG !== expected) { throw new Error('tag ' + process.env.RELEASE_TAG + ' must equal ' + expected); }"
      - run: npm run check

  windows:
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 40
    env:
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@1.80.0
      - run: npm ci
      - name: Require Windows signing credentials
        shell: pwsh
        run: if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_LINK)) { throw 'WIN_CSC_LINK is required for a public release' }
      - run: npm run dist:win -- --x64 -c.forceCodeSigning=true
      - name: Write checksums
        shell: pwsh
        run: Get-ChildItem release -File -Filter *.exe | ForEach-Object { "$(($_ | Get-FileHash -Algorithm SHA256).Hash.ToLower())  $($_.Name)" } | Set-Content release/SHA256SUMS-windows.txt
      - uses: actions/upload-artifact@v6
        with:
          name: installer-windows-x64
          path: |
            release/*.exe
            release/SHA256SUMS-windows.txt
          if-no-files-found: error

  macos:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: arm64
          - os: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50
    env:
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@1.80.0
      - run: npm ci
      - name: Require Apple signing and notarization credentials
        shell: bash
        run: |
          test -n "$CSC_LINK"
          test -n "$APPLE_API_KEY"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"
      - run: npm run dist:mac -- --${{ matrix.arch }} -c.forceCodeSigning=true -c.mac.notarize=true
      - name: Write checksums
        shell: bash
        run: shasum -a 256 release/*.dmg release/*.zip > release/SHA256SUMS-macos-${{ matrix.arch }}.txt
      - uses: actions/upload-artifact@v6
        with:
          name: installer-macos-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/SHA256SUMS-macos-${{ matrix.arch }}.txt
          if-no-files-found: error

  draft-release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: installer-*
          path: artifacts
          merge-multiple: true
      - name: Create draft release and upload signed installers
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --repo "$REPOSITORY" --draft --generate-notes --title "RadioChron Desktop $RELEASE_TAG"
          fi
          gh release upload "$RELEASE_TAG" artifacts/* --repo "$REPOSITORY" --clobber
